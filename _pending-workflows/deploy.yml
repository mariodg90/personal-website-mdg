name: Build & publish to deploy branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish dist/ to deploy branch
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Capture the source SHA before we leave the working tree.
          SRC_SHA="${GITHUB_SHA}"

          # Move dist/ out of the working tree so we can switch branches safely.
          mv dist /tmp/site-dist

          # Create or reset the deploy branch as an orphan so its history
          # contains only built artefacts.
          git checkout --orphan deploy
          git rm -rf . > /dev/null 2>&1 || true

          # Bring the build artefacts back in.
          cp -R /tmp/site-dist/. .
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Deploy ${SRC_SHA}"
          git push --force origin deploy
